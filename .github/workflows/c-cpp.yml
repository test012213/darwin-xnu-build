name: XNU CodeQL x86_64

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - Makefile
      - .cirrus.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 240
    strategy:
      matrix:
        macos-version: ["26.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Patch build.sh for macOS 26.4
        run: |
          python3 << 'PYEOF'
          import re
          with open('build.sh') as f:
              content = f.read()
          new_case = (
              "    '26.4')\n"
              "      RELEASE_URL='https://raw.githubusercontent.com/apple-oss-distributions/distribution-macOS/macos-264/release.json'\n"
              "      KDK_NAME='Kernel Debug Kit 26.4 build 25E246'\n"
              "      KDKROOT='/Library/Developer/KDKs/KDK_26.4_25E246.kdk/'\n"
              "      RC_DARWIN_KERNEL_VERSION='25.4.0'\n"
              "      ;;\n\n"
          )
          patched = re.sub(
              r'(?m)^(\s+\*\)\s*\n\s+error \"Invalid xnu version\")',
              new_case + r'\1',
              content,
              count=1
          )
          assert patched != content, "Patch did not apply — check build.sh structure"
          with open('build.sh', 'w') as f:
              f.write(patched)
          print('build.sh patched for 26.4')
          PYEOF

      - name: Deps
        run: |
          brew install bash blacktop/tap/ipsw
          brew uninstall cmake || true
          brew install cmake
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP"
            echo "Selected Xcode: $XCODE_APP"
          else
            sudo xcode-select -s /Applications/Xcode_26.1.app
            echo "Fallback: using Xcode 26.1"
          fi

      - name: kmutil help
        run: |
          sysctl -n kern.bootobjectspath || true
          sw_vers
          kmutil inspect

      # -------------------------
      # SMART LOGGING STARTS HERE
      # -------------------------

      - name: Build XNU JSON compilation database
        if: steps.cache-jsondb.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          (
            MACOS_VERSION='${{ matrix.macos-version }}' ARCH_CONFIG=X86_64 MACHINE_CONFIG=NONE JSONDB=1 bash build.sh
          ) &> jsondb.log || (
            echo "❌ JSONDB build failed — showing last 500 lines:"
            tail -n 500 jsondb.log
            exit 1
          )
          zip -j xnu-${{ matrix.macos-version }}-x86_64-jsondb.zip .cache/${{ matrix.macos-version }}/compile_commands.json

      - name: Build XNU
        run: |
          set -o pipefail
          (
            MACOS_VERSION='${{ matrix.macos-version }}' ARCH_CONFIG=X86_64 MACHINE_CONFIG=NONE bash build.sh
          ) &> build-xnu.log || (
            echo "❌ XNU build failed — showing last 500 lines:"
            tail -n 500 build-xnu.log
            exit 1
          )

          ls -lah fakeroot/System/Library/Kernels/ || true

          if [ -f "fakeroot/System/Library/Kernels/kernel.release.none" ]; then
            echo "Found kernel at fakeroot/System/Library/Kernels/kernel.release.none"
            cp fakeroot/System/Library/Kernels/kernel.release.none .
          elif [ -f "fakeroot/System/Library/Kernels/kernel" ]; then
            echo "Found kernel at fakeroot/System/Library/Kernels/kernel — renaming to kernel.release.none"
            cp fakeroot/System/Library/Kernels/kernel .
            mv kernel kernel.release.none
          elif [ -f "kernel" ]; then
            echo "Found kernel at repository root — renaming to kernel.release.none"
            mv kernel kernel.release.none
          else
            echo "❌ kernel.release.none not found in expected locations"
            echo "Listing workspace root for debugging:"
            ls -lah || true
            echo "Showing last 500 lines of build log for context:"
            tail -n 500 build-xnu.log || true
            exit 1
          fi

          shasum -a 256 kernel.release.none > kernel.release.none.sha256
          echo "Kernel checksum:"
          cat kernel.release.none.sha256

      - name: Build XNU library
        run: |
          set -o pipefail
          (
            MACOS_VERSION='${{ matrix.macos-version }}' ARCH_CONFIG=X86_64 MACHINE_CONFIG=NONE bash build.sh --lib
          ) &> build-lib.log || (
            echo "❌ Library build failed — showing last 500 lines:"
            tail -n 500 build-lib.log
            exit 1
          )

          # Prefer creating a tarball if both expected artifacts exist
          LIB_OBJ_DIR="build/xnu-lib.obj"
          TAR_NAME="xnu-lib-${{ matrix.macos-version }}-x86_64.tar.gz"

          if [ -f "${LIB_OBJ_DIR}/libkernel.release.none.a" ] && [ -d "${LIB_OBJ_DIR}/RELEASE_X86_64_NONE" ]; then
            echo "Packaging libkernel.release.none.a and RELEASE_X86_64_NONE into ${TAR_NAME}"
            tar -czf "${TAR_NAME}" -C "${LIB_OBJ_DIR}" libkernel.release.none.a RELEASE_X86_64_NONE || true
            if [ -f "${TAR_NAME}" ]; then
              shasum -a 256 "${TAR_NAME}" > "${TAR_NAME}.sha256"
              echo "Created ${TAR_NAME} and checksum"
            else
              echo "❌ Failed to create ${TAR_NAME}"
            fi
          else
            echo "Warning: expected library artifacts missing."
            echo "Listing ${LIB_OBJ_DIR} contents for debugging:"
            ls -lah "${LIB_OBJ_DIR}" || true

            # Collect whatever exists so it can be uploaded for inspection
            mkdir -p xnu-lib-artifacts || true
            if [ -f "${LIB_OBJ_DIR}/libkernel.release.none.a" ]; then
              cp "${LIB_OBJ_DIR}/libkernel.release.none.a" xnu-lib-artifacts/ || true
            fi
            if [ -d "${LIB_OBJ_DIR}/RELEASE_X86_64_NONE" ]; then
              cp -a "${LIB_OBJ_DIR}/RELEASE_X86_64_NONE" xnu-lib-artifacts/ || true
            fi
            # If nothing found, include the build log for debugging
            if [ -z "$(ls -A xnu-lib-artifacts 2>/dev/null || true)" ]; then
              echo "No library artifacts found; including build-lib.log for inspection"
              cp build-lib.log xnu-lib-artifacts/ || true
            fi
          fi

      - name: Upload kernel artifact (if present)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xnu-build-${{ matrix.macos-version }}-x86_64
          path: |
            kernel.release.none
            kernel.release.none.sha256
            fakeroot/System/Library/Kernels/

      - name: Upload xnu library artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xnu-lib-${{ matrix.macos-version }}-x86_64
          path: |
            xnu-lib-${{ matrix.macos-version }}-x86_64.tar.gz
            xnu-lib-${{ matrix.macos-version }}-x86_64.tar.gz.sha256
            xnu-lib-artifacts/

      - name: Build XNU CodeQL Database
        run: |
          set -o pipefail
          (
            MACOS_VERSION='${{ matrix.macos-version }}' ARCH_CONFIG=X86_64 MACHINE_CONFIG=NONE bash codeql.sh
          ) &> codeql.log || (
            echo "❌ CodeQL build failed — showing last 500 lines:"
            tail -n 500 codeql.log
            exit 1
          )
          mv xnu-codeql.zip xnu-codeql-${{ matrix.macos-version }}-x86_64.zip
          shasum -a 256 xnu-codeql-${{ matrix.macos-version }}-x86_64.zip > xnu-codeql-${{ matrix.macos-version }}-x86_64.zip.sha256

      - uses: actions/upload-artifact@v6
        with:
          name: xnu-codeql-${{ matrix.macos-version }}-x86_64
          path: |
            xnu-codeql-${{ matrix.macos-version }}-x86_64.zip
            xnu-codeql-${{ matrix.macos-version }}-x86_64.zip.sha256

      # Upload all logs no matter what
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xnu-logs-${{ matrix.macos-version }}-x86_64
          path: |
            *.log
